<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sky Segmentation</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container py-5">
    <div class="text-center mb-5">
        <h1 class="fw-bold text-primary">Sky Segmentation</h1>
        <p class="text-muted fs-5">AI-powered sky region segmentation</p>
    </div>

    <div class="row g-4">
        <!-- LEFT: Upload -->
        <div class="col-lg-5">
            <div class="card shadow h-100">
                <div class="card-body">
                    <h5 class="card-title mb-4">Upload Sky Image</h5>
                    
                    <label class="upload-box w-100 text-center" id="uploadLabel">
                        <input type="file" id="fileInput" accept="image/jpeg, image/png, image/webp" hidden>
                        <div>
                            <h1 class="mb-3">📁</h1>
                            <p class="mb-1 fw-semibold">Klik atau seret gambar ke sini</p>
                            <small class="text-muted">JPG, PNG, WebP • Maksimal 10MB</small>
                        </div>
                    </label>

                    <img id="imagePreview" class="img-fluid mt-3 rounded d-none" alt="Preview">
                    
                    <button id="detectBtn" class="btn btn-primary detect-btn w-100 mt-4 fw-bold">
                        <span id="btnText">Detect Sky</span>
                        <span id="loadingSpinner" class="spinner-border spinner-border-sm d-none ms-2"></span>
                    </button>
                </div>
            </div>
        </div>

        <!-- RIGHT: Result -->
        <div class="col-lg-7">
            <div class="card shadow h-100">
                <div class="card-body">
                    <h5 class="card-title mb-4">Hasil Segmentasi</h5>
                    
                    <div class="image-preview text-center mb-4">
                        <img id="resultImage" class="img-fluid rounded" alt="Result">
                        <canvas id="canvas"></canvas>
                    </div>

                    <div class="result-box p-4 rounded">
                        <h6 class="mb-3">📊 Hasil Deteksi</h6>
                        <ul id="resultList" class="mb-0"></ul>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="text-center mt-5 text-muted small">
        © 2026 Sky Segmentation • Powered by Ultralytics
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
